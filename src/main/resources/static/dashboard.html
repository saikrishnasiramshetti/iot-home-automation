<!DOCTYPE html>
<html>
<head>
<title>Device Dashboard</title>

<style>
body{
  font-family: Arial;
  text-align: center;
}

.container{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:20px;
  margin-top:20px;
}

img{
  width:120px;
  height:120px;
  filter: grayscale(100%);
  transition: 0.5s ease;
}

p{
  font-weight:bold;
}

/* 🔥 BLINK EFFECT */
@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
}

.fan-blink {
  animation: blink 0.5s infinite;
}
</style>
</head>

<body>

<h1>DEVICE STATUS DASHBOARD</h1>

<div class="container">
  <div><img id="d1" src="light.png"><p>LIGHT 1</p></div>
  <div><img id="d2" src="light.png"><p>LIGHT 2</p></div>
  <div><img id="d3" src="fan.png"><p>FAN 1</p></div>
  <div><img id="d4" src="fan.png"><p>FAN 2</p></div>
  <div><img id="d5" src="tv.png"><p>TV</p></div>
  <div><img id="d6" src="heater.png"><p>HEATER</p></div>
  <div><img id="d7" src="motor.png"><p>MOTOR</p></div>
  <div><img id="d8" src="ac.png"><p>AC</p></div>
</div>

<script>

let isLoading = false;

// 🔥 Track state (ON/OFF)
let deviceState = {};

function loadStatus(){

  if(isLoading) return;
  isLoading = true;
  
  fetch("https://iot-home-automation-2.onrender.com/status")
  .then(res => res.text())
  .then(data => {

    console.log("DATA:", data);

    let devices = data.split(",");

    devices.forEach(item => {

      if(item.trim() === "") return;

      let parts = item.split(":");

      let device = parts[0].trim();
      let status = parts[1].trim().toUpperCase();

      let img = document.getElementById("d" + device);

      if(img){

        if(status === "ON"){

          img.style.filter = "grayscale(0%)";

          // 🔥 FAN ONLY (d3, d4)
          if(device === "3" || device === "4"){

            // Only blink when OFF → ON
            if(deviceState[device] !== "ON"){

              deviceState[device] = "ON";

              img.classList.add("fan-blink");

              setTimeout(() => {
                img.classList.remove("fan-blink");
              }, 3000);
            }

          }

        } else {

          img.style.filter = "grayscale(100%)";
          img.classList.remove("fan-blink");

          // mark OFF
          deviceState[device] = "OFF";

        }

      }

    });

  })
  .catch(err => console.log("Error:", err))
  .finally(() => {
    isLoading = false;
  });
}

window.onload = function(){
  loadStatus();
  setInterval(loadStatus, 5000); // ✅ keep 5 seconds
}

</script>

</body>
</html>
